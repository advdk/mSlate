name: Release mSlate

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Windows signing certificate
        if: matrix.os == 'windows-latest' && secrets.WINDOWS_CERT_PFX_BASE64 != '' && secrets.WINDOWS_CERT_PASSWORD != ''
        shell: pwsh
        env:
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
        run: |
          New-Item -ItemType Directory -Force -Path .codesign | Out-Null
          [System.IO.File]::WriteAllBytes(
            (Join-Path $PWD '.codesign/windows-cert.pfx'),
            [System.Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64)
          )

      - name: Lint
        run: npm run lint

      - name: Publish release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINDOWS_CERT_FILE: ${{ matrix.os == 'windows-latest' && format('{0}/.codesign/windows-cert.pfx', github.workspace) || '' }}
          WINDOWS_CERT_PASSWORD: ${{ matrix.os == 'windows-latest' && secrets.WINDOWS_CERT_PASSWORD || '' }}
        run: npm run publish

      - name: Remove Windows signing certificate
        if: always() && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path .codesign/windows-cert.pfx) {
            Remove-Item .codesign/windows-cert.pfx -Force
          }